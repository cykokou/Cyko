<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Blast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05080e;
      --bg-card: #0c1018;
      --fg: #e8eef4;
      --muted: #6b7a8c;
      --accent: #00ffe5;
      --accent-glow: rgba(0, 255, 229, 0.25);
      --border: #1a2332;
      --cell-empty: #111822;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Orbitron', sans-serif;
    }

    /* Background Effects */
    .bg-pattern {
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(0, 255, 229, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.03) 0%, transparent 50%),
        linear-gradient(rgba(0, 255, 229, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 229, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: rgba(0, 255, 229, 0.12);
      top: -150px;
      right: -150px;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(255, 107, 53, 0.08);
      bottom: -100px;
      left: -100px;
    }

    /* Game Grid */
    .game-grid {
      display: grid;
      gap: 3px;
      padding: 12px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 0 60px -20px var(--accent-glow);
    }

    .grid-cell {
      width: 42px;
      height: 42px;
      background: var(--cell-empty);
      border-radius: 6px;
      transition: all 0.15s ease;
      position: relative;
    }

    .grid-cell.preview {
      background: rgba(0, 255, 229, 0.3);
      box-shadow: inset 0 0 0 2px var(--accent);
    }

    .grid-cell.invalid {
      background: rgba(255, 70, 70, 0.3);
    }

    .grid-cell.filled {
      border-radius: 4px;
      transform: scale(1);
    }

    .grid-cell.clearing {
      animation: clearCell 0.4s ease forwards;
    }

    @keyframes clearCell {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Pieces Tray */
    .pieces-tray {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 24px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
    }

    .piece-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .game-piece {
      display: grid;
      gap: 2px;
      padding: 8px;
      background: rgba(0, 255, 229, 0.03);
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: grab;
      transition: all 0.3s ease;
      user-select: none;
    }

    .game-piece:hover {
      border-color: var(--accent);
      background: rgba(0, 255, 229, 0.08);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px -10px var(--accent-glow);
    }

    .game-piece.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .game-piece.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .piece-cell {
      width: 24px;
      height: 24px;
      border-radius: 3px;
      transition: all 0.15s ease;
    }

    .piece-cell.filled {
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3), inset 0 2px 0 rgba(255,255,255,0.15);
    }

    .piece-cell.empty {
      background: transparent;
    }

    /* Score Panel */
    .score-panel {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .score-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), #00c9b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Combo Popup */
    .combo-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Orbitron', sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
      pointer-events: none;
      z-index: 100;
      opacity: 0;
    }

    .combo-popup.show {
      animation: comboShow 0.8s ease forwards;
    }

    @keyframes comboShow {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    /* Game Over Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 14, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 48px;
      text-align: center;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s ease;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1) translateY(0);
    }

    /* Button */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00c9b7);
      color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px var(--accent);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: transparent;
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      padding: 12px 24px;
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeInUp 0.6s ease forwards;
    }

    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }

    /* Responsive */
    @media (max-width: 640px) {
      .grid-cell {
        width: 34px;
        height: 34px;
      }
      .piece-cell {
        width: 18px;
        height: 18px;
      }
      .score-value {
        font-size: 2rem;
      }
      .pieces-tray {
        padding: 16px;
        gap: 12px;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="bg-pattern">
  <!-- Background Orbs -->
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <!-- Combo Popup -->
  <div id="combo-popup" class="combo-popup"></div>

  <!-- Main Game -->
  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-4 gap-8">
    
    <!-- Header -->
    <header class="text-center animate-in">
      <h1 class="font-display text-4xl md:text-5xl font-black tracking-wide mb-2">
        <span style="color: var(--accent);">BLOCK</span> BLAST
      </h1>
      <p class="text-[var(--muted)] text-sm">Place blocks. Clear lines. Score big.</p>
    </header>

    <!-- Score Panel -->
    <div class="score-panel text-center animate-in delay-1">
      <div class="text-[var(--muted)] text-sm mb-1">SCORE</div>
      <div class="score-value" id="score">0</div>
      <div class="flex gap-6 justify-center mt-4 text-sm">
        <div>
          <span class="text-[var(--muted)]">Best:</span>
          <span class="font-display font-bold" id="best-score">0</span>
        </div>
        <div>
          <span class="text-[var(--muted)]">Lines:</span>
          <span class="font-display font-bold" id="lines-cleared">0</span>
        </div>
      </div>
    </div>

    <!-- Game Grid -->
    <div class="game-grid animate-in delay-2" id="game-grid">
      <!-- Grid cells generated by JS -->
    </div>

    <!-- Pieces Tray -->
    <div class="pieces-tray animate-in delay-3" id="pieces-tray">
      <!-- Pieces generated by JS -->
    </div>

    <!-- Controls -->
    <div class="flex gap-4 animate-in delay-3">
      <button class="btn-secondary" onclick="newGame()">New Game</button>
    </div>
  </main>

  <!-- Game Over Modal -->
  <div id="game-over-modal" class="modal-overlay">
    <div class="modal-content">
      <h2 class="font-display text-3xl font-bold mb-2" style="color: var(--accent);">GAME OVER</h2>
      <p class="text-[var(--muted)] mb-6">No more valid moves!</p>
      <div class="text-5xl font-display font-black mb-2" id="final-score">0</div>
      <p class="text-[var(--muted)] text-sm mb-8">Final Score</p>
      <button class="btn-primary" onclick="newGame()">Play Again</button>
    </div>
  </div>

  <script>
    // ============ GAME CONFIG ============
    const GRID_SIZE = 8;
    const CELL_SIZE = 42;

    // Block colors - vibrant palette
    const COLORS = [
      '#00ffe5', // Cyan
      '#ff6b35', // Orange
      '#a855f7', // Purple
      '#22c55e', // Green
      '#f59e0b', // Amber
      '#ec4899', // Pink
      '#3b82f6', // Blue
    ];

    // All possible piece shapes
    const PIECE_SHAPES = [
      // Single
      { shape: [[1]], name: 'dot' },
      
      // Lines
      { shape: [[1,1]], name: 'h2' },
      { shape: [[1],[1]], name: 'v2' },
      { shape: [[1,1,1]], name: 'h3' },
      { shape: [[1],[1],[1]], name: 'v3' },
      { shape: [[1,1,1,1]], name: 'h4' },
      { shape: [[1],[1],[1],[1]], name: 'v4' },
      { shape: [[1,1,1,1,1]], name: 'h5' },
      { shape: [[1],[1],[1],[1],[1]], name: 'v5' },
      
      // Squares
      { shape: [[1,1],[1,1]], name: 'sq2' },
      { shape: [[1,1,1],[1,1,1],[1,1,1]], name: 'sq3' },
      
      // L shapes
      { shape: [[1,0],[1,0],[1,1]], name: 'L1' },
      { shape: [[1,1,1],[1,0,0]], name: 'L2' },
      { shape: [[1,1],[0,1],[0,1]], name: 'L3' },
      { shape: [[0,0,1],[1,1,1]], name: 'L4' },
      { shape: [[1,1,0],[0,1,1]], name: 'S1' },
      { shape: [[0,1,1],[1,1,0]], name: 'S2' },
      
      // T shapes
      { shape: [[1,1,1],[0,1,0]], name: 'T1' },
      { shape: [[0,1],[1,1],[0,1]], name: 'T2' },
      { shape: [[0,1,0],[1,1,1]], name: 'T3' },
      { shape: [[1,0],[1,1],[1,0]], name: 'T4' },
    ];

    // ============ GAME STATE ============
    let grid = [];
    let currentPieces = [];
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('blockBlastBest') || '0');
    let linesCleared = 0;
    let draggedPiece = null;
    let dragOffset = { x: 0, y: 0 };

    // ============ DOM ELEMENTS ============
    const gridEl = document.getElementById('game-grid');
    const trayEl = document.getElementById('pieces-tray');
    const scoreEl = document.getElementById('score');
    const bestScoreEl = document.getElementById('best-score');
    const linesEl = document.getElementById('lines-cleared');
    const comboPopup = document.getElementById('combo-popup');
    const gameOverModal = document.getElementById('game-over-modal');
    const finalScoreEl = document.getElementById('final-score');

    // ============ INITIALIZATION ============
    function init() {
      createGrid();
      newGame();
      setupDragListeners();
      bestScoreEl.textContent = bestScore;
    }

    function createGrid() {
      gridEl.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
      gridEl.innerHTML = '';
      
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.dataset.x = x;
          cell.dataset.y = y;
          gridEl.appendChild(cell);
        }
      }
    }

    function newGame() {
      // Reset state
      grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(null));
      score = 0;
      linesCleared = 0;
      currentPieces = [];
      
      // Update UI
      scoreEl.textContent = '0';
      linesEl.textContent = '0';
      gameOverModal.classList.remove('active');
      
      // Clear grid visuals
      document.querySelectorAll('.grid-cell').forEach(cell => {
        cell.className = 'grid-cell';
        cell.style.background = '';
      });
      
      // Generate new pieces
      generatePieces();
    }

    function generatePieces() {
      currentPieces = [];
      
      for (let i = 0; i < 3; i++) {
        const shapeData = PIECE_SHAPES[Math.floor(Math.random() * PIECE_SHAPES.length)];
        const color = COLORS[Math.floor(Math.random() * COLORS.length)];
        currentPieces.push({
          id: i,
          shape: shapeData.shape,
          color: color,
          used: false
        });
      }
      
      renderPieces();
      checkGameOver();
    }

    // ============ RENDERING ============
    function renderPieces() {
      trayEl.innerHTML = '';
      
      currentPieces.forEach((piece, idx) => {
        if (piece.used) return;
        
        const container = document.createElement('div');
        container.className = 'piece-container';
        
        const pieceEl = document.createElement('div');
        pieceEl.className = 'game-piece';
        pieceEl.dataset.pieceId = idx;
        pieceEl.style.gridTemplateColumns = `repeat(${piece.shape[0].length}, 1fr)`;
        
        piece.shape.forEach((row, py) => {
          row.forEach((cell, px) => {
            const cellEl = document.createElement('div');
            cellEl.className = 'piece-cell';
            
            if (cell) {
              cellEl.classList.add('filled');
              cellEl.style.background = piece.color;
            } else {
              cellEl.classList.add('empty');
            }
            
            pieceEl.appendChild(cellEl);
          });
        });
        
        // Check if piece can be placed
        if (!canPieceBePlaced(piece)) {
          pieceEl.classList.add('disabled');
        }
        
        container.appendChild(pieceEl);
        trayEl.appendChild(container);
      });
    }

    function renderGrid() {
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = document.querySelector(`.grid-cell[data-x="${x}"][data-y="${y}"]`);
          if (grid[y][x]) {
            cell.classList.add('filled');
            cell.style.background = grid[y][x];
          } else {
            cell.className = 'grid-cell';
            cell.style.background = '';
          }
        }
      }
    }

    // ============ DRAG AND DROP ============
    function setupDragListeners() {
      // Mouse events for pieces
      trayEl.addEventListener('mousedown', onDragStart);
      document.addEventListener('mousemove', onDragMove);
      document.addEventListener('mouseup', onDragEnd);
      
      // Touch events
      trayEl.addEventListener('touchstart', onDragStart, { passive: false });
      document.addEventListener('touchmove', onDragMove, { passive: false });
      document.addEventListener('touchend', onDragEnd);
    }

    function onDragStart(e) {
      const pieceEl = e.target.closest('.game-piece');
      if (!pieceEl || pieceEl.classList.contains('disabled')) return;
      
      e.preventDefault();
      
      const pieceId = parseInt(pieceEl.dataset.pieceId);
      draggedPiece = currentPieces[pieceId];
      
      const rect = pieceEl.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      dragOffset.x = clientX - rect.left;
      dragOffset.y = clientY - rect.top;
      
      pieceEl.classList.add('dragging');
    }

    function onDragMove(e) {
      if (!draggedPiece) return;
      
      e.preventDefault();
      
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      // Calculate grid position
      const gridRect = gridEl.getBoundingClientRect();
      const cellSize = gridRect.width / GRID_SIZE;
      
      const gridX = Math.floor((clientX - gridRect.left) / cellSize);
      const gridY = Math.floor((clientY - gridRect.top) / cellSize);
      
      // Clear previous preview
      clearPreview();
      
      // Show preview
      showPreview(draggedPiece, gridX, gridY);
    }

    function onDragEnd(e) {
      if (!draggedPiece) return;
      
      const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
      const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
      
      // Calculate final grid position
      const gridRect = gridEl.getBoundingClientRect();
      const cellSize = gridRect.width / GRID_SIZE;
      
      const gridX = Math.floor((clientX - gridRect.left) / cellSize);
      const gridY = Math.floor((clientY - gridRect.top) / cellSize);
      
      // Try to place piece
      if (canPlace(draggedPiece.shape, gridX, gridY)) {
        placePiece(draggedPiece, gridX, gridY);
      }
      
      // Clear preview and reset
      clearPreview();
      document.querySelectorAll('.game-piece.dragging').forEach(el => {
        el.classList.remove('dragging');
      });
      draggedPiece = null;
    }

    // ============ GAME LOGIC ============
    function canPlace(shape, startX, startY) {
      for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
          if (shape[y][x]) {
            const gridX = startX + x;
            const gridY = startY + y;
            
            if (gridX < 0 || gridX >= GRID_SIZE || 
                gridY < 0 || gridY >= GRID_SIZE ||
                grid[gridY][gridX]) {
              return false;
            }
          }
        }
      }
      return true;
    }

    function canPieceBePlaced(piece) {
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          if (canPlace(piece.shape, x, y)) {
            return true;
          }
        }
      }
      return false;
    }

    function placePiece(piece, startX, startY) {
      // Place piece on grid
      piece.shape.forEach((row, y) => {
        row.forEach((cell, x) => {
          if (cell) {
            grid[startY + y][startX + x] = piece.color;
          }
        });
      });
      
      // Mark piece as used
      piece.used = true;
      
      // Calculate score for placing
      const cellsPlaced = piece.shape.flat().filter(c => c).length;
      score += cellsPlaced;
      
      // Check and clear lines
      const cleared = checkAndClearLines();
      score += cleared * 10 * (cleared > 1 ? cleared : 1); // Bonus for multi-clear
      
      // Update UI
      scoreEl.textContent = score;
      
      if (score > bestScore) {
        bestScore = score;
        bestScoreEl.textContent = bestScore;
        localStorage.setItem('blockBlastBest', bestScore.toString());
      }
      
      renderGrid();
      renderPieces();
      
      // Check if need new pieces
      if (currentPieces.every(p => p.used)) {
        generatePieces();
      } else {
        checkGameOver();
      }
    }

    function checkAndClearLines() {
      const rowsToClear = [];
      const colsToClear = [];
      
      // Check rows
      for (let y = 0; y < GRID_SIZE; y++) {
        if (grid[y].every(cell => cell !== null)) {
          rowsToClear.push(y);
        }
      }
      
      // Check columns
      for (let x = 0; x < GRID_SIZE; x++) {
        let fullCol = true;
        for (let y = 0; y < GRID_SIZE; y++) {
          if (!grid[y][x]) {
            fullCol = false;
            break;
          }
        }
        if (fullCol) {
          colsToClear.push(x);
        }
      }
      
      const totalCleared = rowsToClear.length + colsToClear.length;
      
      if (totalCleared > 0) {
        linesCleared += totalCleared;
        linesEl.textContent = linesCleared;
        
        // Animate clearing
        const cellsToClear = new Set();
        
        rowsToClear.forEach(y => {
          for (let x = 0; x < GRID_SIZE; x++) {
            cellsToClear.add(`${x},${y}`);
          }
        });
        
        colsToClear.forEach(x => {
          for (let y = 0; y < GRID_SIZE; y++) {
            cellsToClear.add(`${x},${y}`);
          }
        });
        
        cellsToClear.forEach(key => {
          const [x, y] = key.split(',').map(Number);
          const cell = document.querySelector(`.grid-cell[data-x="${x}"][data-y="${y}"]`);
          if (cell) {
            cell.classList.add('clearing');
          }
        });
        
        // Show combo popup
        if (totalCleared >= 2) {
          showCombo(totalCleared);
        }
        
        // Clear after animation
        setTimeout(() => {
          cellsToClear.forEach(key => {
            const [x, y] = key.split(',').map(Number);
            grid[y][x] = null;
          });
          renderGrid();
        }, 400);
      }
      
      return totalCleared;
    }

    function showCombo(count) {
      const messages = {
        2: 'DOUBLE!',
        3: 'TRIPLE!',
        4: 'QUAD!',
        5: 'AMAZING!',
      };
      
      comboPopup.textContent = messages[Math.min(count, 5)] || `${count}x COMBO!`;
      comboPopup.classList.remove('show');
      void comboPopup.offsetWidth; // Trigger reflow
      comboPopup.classList.add('show');
    }

    function showPreview(piece, startX, startY) {
      const isValid = canPlace(piece.shape, startX, startY);
      
      piece.shape.forEach((row, y) => {
        row.forEach((cell, x) => {
          if (cell) {
            const gridX = startX + x;
            const gridY = startY + y;
            
            if (gridX >= 0 && gridX < GRID_SIZE && gridY >= 0 && gridY < GRID_SIZE) {
              const cellEl = document.querySelector(`.grid-cell[data-x="${gridX}"][data-y="${gridY}"]`);
              if (cellEl && !grid[gridY][gridX]) {
                cellEl.classList.add(isValid ? 'preview' : 'invalid');
              }
            }
          }
        });
      });
    }

    function clearPreview() {
      document.querySelectorAll('.grid-cell.preview, .grid-cell.invalid').forEach(cell => {
        cell.classList.remove('preview', 'invalid');
      });
    }

    function checkGameOver() {
      const availablePieces = currentPieces.filter(p => !p.used);
      const hasValidMove = availablePieces.some(p => canPieceBePlaced(p));
      
      if (!hasValidMove && availablePieces.length > 0) {
        // Game over - no valid moves
        setTimeout(() => {
          finalScoreEl.textContent = score;
          gameOverModal.classList.add('active');
        }, 500);
      }
    }

    // ============ START GAME ============
    init();
  </script>
</body>
</html>
