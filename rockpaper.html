<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors - 剪刀石頭布</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .choice-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        
        .choice-btn:active {
            transform: scale(0.95);
        }
        
        .result-area {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        
        .player, .computer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .choice-display {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }
        
        .vs {
            display: flex;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: #ff7e5f;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            font-size: 1.5rem;
        }
        
        .score {
            font-size: 3rem;
            font-weight: bold;
            color: #4cc9f0;
        }
        
        .message {
            font-size: 1.8rem;
            margin-top: 20px;
            min-height: 60px;
            color: #feb47b;
        }
        
        .controls {
            margin-top: 30px;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #4cc9f0, #2a9d8f);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        @media (max-width: 768px) {
            .choices {
                gap: 10px;
            }
            .choice-btn {
                width: 100px;
                height: 100px;
                font-size: 3rem;
            }
            .choice-display {
                width: 120px;
                height: 120px;
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="position: absolute; top: 20px; left: 20px; color: #ff7e5f; text-decoration: none; font-size: 1rem; display: flex; align-items: center; gap: 5px;">
            ← 返回首頁
        </a>
        <h1>剪刀石頭布</h1>
        <p class="subtitle">挑戰電腦，三戰兩勝！</p>
        
        <div class="game-area">
            <div class="choices">
                <button class="choice-btn" data-choice="rock">✊</button>
                <button class="choice-btn" data-choice="paper">✋</button>
                <button class="choice-btn" data-choice="scissors">✌️</button>
            </div>
            
            <div class="result-area">
                <div class="player">
                    <h3>你</h3>
                    <div class="choice-display" id="player-choice">?</div>
                </div>
                <div class="vs">VS</div>
                <div class="computer">
                    <h3>電腦</h3>
                    <div class="choice-display" id="computer-choice">?</div>
                </div>
            </div>
            
            <div class="score-board">
                <div>
                    <div class="score" id="player-score">0</div>
                    <div>你的分數</div>
                </div>
                <div>
                    <div class="score" id="computer-score">0</div>
                    <div>電腦分數</div>
                </div>
            </div>
            
            <div class="message" id="message">選擇一個選項開始遊戲！</div>
            
            <div class="controls">
                <button id="reset-btn">重新開始</button>
            </div>
        </div>
    </div>

    <script>
        const choices = ['rock', 'paper', 'scissors'];
        const emojis = {
            rock: '✊',
            paper: '✋',
            scissors: '✌️'
        };
        
        let playerScore = 0;
        let computerScore = 0;
        let round = 0;
        
        const playerChoiceDisplay = document.getElementById('player-choice');
        const computerChoiceDisplay = document.getElementById('computer-choice');
        const playerScoreDisplay = document.getElementById('player-score');
        const computerScoreDisplay = document.getElementById('computer-score');
        const messageDisplay = document.getElementById('message');
        const choiceButtons = document.querySelectorAll('.choice-btn');
        const resetButton = document.getElementById('reset-btn');
        
        function getComputerChoice() {
            const randomIndex = Math.floor(Math.random() * 3);
            return choices[randomIndex];
        }
        
        function determineWinner(player, computer) {
            if (player === computer) return 'draw';
            if (
                (player === 'rock' && computer === 'scissors') ||
                (player === 'paper' && computer === 'rock') ||
                (player === 'scissors' && computer === 'paper')
            ) {
                return 'player';
            }
            return 'computer';
        }
        
        function updateDisplay(playerChoice, computerChoice, winner) {
            playerChoiceDisplay.textContent = emojis[playerChoice];
            computerChoiceDisplay.textContent = emojis[computerChoice];
            
            if (winner === 'player') {
                messageDisplay.textContent = '你贏了！';
                messageDisplay.style.color = '#4cc9f0';
                playerScore++;
            } else if (winner === 'computer') {
                messageDisplay.textContent = '電腦贏了！';
                messageDisplay.style.color = '#ff7e5f';
                computerScore++;
            } else {
                messageDisplay.textContent = '平手！';
                messageDisplay.style.color = '#feb47b';
            }
            
            playerScoreDisplay.textContent = playerScore;
            computerScoreDisplay.textContent = computerScore;
            
            // Check for game over (best of 3)
            if (playerScore >= 2 || computerScore >= 2) {
                const finalMessage = playerScore >= 2 ? '恭喜！你贏得了比賽！' : '電腦贏得了比賽！再試一次！';
                messageDisplay.textContent = finalMessage;
                choiceButtons.forEach(btn => btn.disabled = true);
            }
        }
        
        choiceButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (playerScore >= 2 || computerScore >= 2) return;
                
                const playerChoice = button.dataset.choice;
                const computerChoice = getComputerChoice();
                const winner = determineWinner(playerChoice, computerChoice);
                updateDisplay(playerChoice, computerChoice, winner);
            });
        });
        
        resetButton.addEventListener('click', () => {
            playerScore = 0;
            computerScore = 0;
            playerScoreDisplay.textContent = '0';
            computerScoreDisplay.textContent = '0';
            playerChoiceDisplay.textContent = '?';
            computerChoiceDisplay.textContent = '?';
            messageDisplay.textContent = '選擇一個選項開始遊戲！';
            messageDisplay.style.color = '#feb47b';
            choiceButtons.forEach(btn => btn.disabled = false);
        });
    </script>
</body>
</html>
