<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳單分攤器 - 理財達人</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-alt: #fafbfc;
            --fg: #1a1f2e;
            --muted: #5a6374;
            --accent: #0a5c5c;
            --accent-light: #0d7a7a;
            --card: #ffffff;
            --border: #e8eaed;
            --shadow: rgba(10, 92, 92, 0.08);
            --success: #059669;
            --danger: #dc2626;
        }
        
        * {
            font-family: 'Noto Sans TC', sans-serif;
        }
        
        .headline-font {
            font-family: 'Zen Kaku Gothic New', 'Noto Sans TC', sans-serif;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-delay-3 { animation-delay: 0.3s; opacity: 0; }
        
        @media (prefers-reduced-motion: reduce) {
            .animate-fade-in-up {
                animation: none;
                opacity: 1;
            }
        }
        
        /* 输入框样式 */
        .input-field {
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(10, 92, 92, 0.1);
        }
        
        .input-field:hover:not(:focus) {
            border-color: #d1d5db;
        }
        
        /* 按钮样式 */
        .btn-primary {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(10, 92, 92, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: var(--bg-alt);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* 卡片样式 */
        .card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border);
        }
        
        .card:hover {
            box-shadow: 0 20px 50px var(--shadow);
        }
        
        /* 成员项目 */
        .member-item {
            transition: all 0.3s ease;
        }
        
        .member-item:hover {
            background: var(--bg-alt);
        }
        
        .member-item.removing {
            animation: slideOut 0.3s ease forwards;
        }
        
        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(-20px);
                height: 0;
                padding: 0;
                margin: 0;
            }
        }
        
        /* 结果动画 */
        .result-item {
            animation: resultFadeIn 0.5s ease forwards;
            opacity: 0;
        }
        
        @keyframes resultFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(10px);
            }
        }
        
        /* Tab 样式 */
        .tab-btn {
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: var(--accent);
            color: white;
        }
        
        .tab-btn:not(.active):hover {
            background: var(--bg-alt);
        }
        
        /* Focus states */
        .focus-ring:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }
        
        /* 背景网格 */
        .bg-grid {
            background-image: 
                linear-gradient(rgba(10, 92, 92, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 92, 92, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        
        /* 提示框 */
        .tooltip {
            position: relative;
        }
        
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: var(--fg);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        
        .tooltip:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }
        
        /* 进度条 */
        .progress-bar {
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="bg-white text-[#1a1f2e]">
    <!-- 导航 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-[#e8eaed]">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="headline-font text-xl font-bold text-[#0a5c5c] focus-ring rounded" aria-label="返回首頁">
                理財達人
            </a>
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html#problems" class="text-sm text-[#5a6374] hover:text-[#0a5c5c] transition-colors focus-ring rounded px-2 py-1">為什麼需要理財</a>
                <a href="index.html#features" class="text-sm text-[#5a6374] hover:text-[#0a5c5c] transition-colors focus-ring rounded px-2 py-1">功能介紹</a>
                <a href="index.html#process" class="text-sm text-[#5a6374] hover:text-[#0a5c5c] transition-colors focus-ring rounded px-2 py-1">使用流程</a>
                <a href="index.html#team" class="text-sm text-[#5a6374] hover:text-[#0a5c5c] transition-colors focus-ring rounded px-2 py-1">團隊介紹</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden p-2 focus-ring rounded" aria-label="開啟選單" aria-expanded="false">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="md:hidden hidden bg-white border-t border-[#e8eaed]">
            <div class="px-6 py-4 space-y-4">
                <a href="index.html" class="block text-sm text-[#0a5c5c] font-medium">返回首頁</a>
                <a href="index.html#features" class="block text-sm text-[#5a6374] hover:text-[#0a5c5c]">功能介紹</a>
                <a href="index.html#process" class="block text-sm text-[#5a6374] hover:text-[#0a5c5c]">使用流程</a>
                <a href="index.html#team" class="block text-sm text-[#5a6374] hover:text-[#0a5c5c]">團隊介紹</a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="pt-24 pb-16 min-h-screen bg-[#fafbfc] bg-grid">
        <div class="max-w-4xl mx-auto px-6">
            <!-- 页面标题 -->
            <div class="text-center mb-12 animate-fade-in-up">
                <p class="text-sm text-[#0a5c5c] font-medium tracking-widest uppercase mb-4">Bill Splitter</p>
                <h1 class="headline-font text-4xl md:text-5xl font-bold text-[#1a1f2e] mb-4">
                    帳單分攤器
                </h1>
                <p class="text-[#5a6374] max-w-md mx-auto">
                    輸入總金額與參與人數，快速計算每人應付金額。支援小費計算與多種分攤模式。
                </p>
            </div>

            <div class="grid lg:grid-cols-5 gap-8">
                <!-- 左侧：输入区 -->
                <div class="lg:col-span-3 space-y-6">
                    <!-- 帐单金额 -->
                    <div class="card bg-white rounded-2xl p-6 animate-fade-in-up animate-delay-1">
                        <h2 class="text-lg font-bold text-[#1a1f2e] mb-6 flex items-center gap-3">
                            <span class="w-10 h-10 bg-[#0a5c5c]/10 rounded-xl flex items-center justify-center">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a5c5c" stroke-width="2">
                                    <path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                                </svg>
                            </span>
                            帳單金額
                        </h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-[#5a6374] mb-2" for="totalAmount">
                                    總金額（含稅）
                                </label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#5a6374] font-medium">$</span>
                                    <input 
                                        type="number" 
                                        id="totalAmount" 
                                        class="input-field w-full pl-10 pr-4 py-4 rounded-xl bg-[#fafbfc] text-2xl font-bold text-[#1a1f2e]"
                                        placeholder="0"
                                        min="0"
                                        step="1"
                                        aria-describedby="amountHelp"
                                    >
                                </div>
                                <p id="amountHelp" class="mt-2 text-xs text-[#5a6374]">請輸入帳單總金額</p>
                            </div>
                        </div>
                    </div>

                    <!-- 小费设置 -->
                    <div class="card bg-white rounded-2xl p-6 animate-fade-in-up animate-delay-2">
                        <h2 class="text-lg font-bold text-[#1a1f2e] mb-6 flex items-center gap-3">
                            <span class="w-10 h-10 bg-[#0a5c5c]/10 rounded-xl flex items-center justify-center">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a5c5c" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"/>
                                    <path d="M12 6v6l4 2"/>
                                </svg>
                            </span>
                            小費設定
                        </h2>
                        
                        <div class="space-y-4">
                            <!-- 快速选择 -->
                            <div class="flex flex-wrap gap-2">
                                <button class="tip-btn tab-btn px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium focus-ring" data-tip="0">0%</button>
                                <button class="tip-btn tab-btn px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium focus-ring" data-tip="10">10%</button>
                                <button class="tip-btn tab-btn active px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium focus-ring" data-tip="15">15%</button>
                                <button class="tip-btn tab-btn px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium focus-ring" data-tip="18">18%</button>
                                <button class="tip-btn tab-btn px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium focus-ring" data-tip="20">20%</button>
                            </div>
                            
                            <!-- 自定义输入 -->
                            <div class="flex items-center gap-3">
                                <span class="text-sm text-[#5a6374]">或自訂</span>
                                <div class="relative flex-1 max-w-[120px]">
                                    <input 
                                        type="number" 
                                        id="customTip" 
                                        class="input-field w-full px-4 py-2 rounded-lg bg-[#fafbfc] text-right"
                                        placeholder="15"
                                        min="0"
                                        max="100"
                                        step="0.5"
                                        aria-label="自訂小費百分比"
                                    >
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[#5a6374]">%</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 参与者 -->
                    <div class="card bg-white rounded-2xl p-6 animate-fade-in-up animate-delay-3">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-bold text-[#1a1f2e] flex items-center gap-3">
                                <span class="w-10 h-10 bg-[#0a5c5c]/10 rounded-xl flex items-center justify-center">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a5c5c" stroke-width="2">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                        <circle cx="9" cy="7" r="4"/>
                                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                    </svg>
                                </span>
                                參與者
                                <span id="memberCount" class="text-sm font-normal text-[#5a6374]">(0人)</span>
                            </h2>
                            <button 
                                id="addMemberBtn"
                                class="btn-secondary px-4 py-2 rounded-lg border border-[#e8eaed] text-sm font-medium text-[#1a1f2e] focus-ring flex items-center gap-2"
                                aria-label="新增參與者"
                            >
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                新增
                            </button>
                        </div>
                        
                        <!-- 添加成员输入 -->
                        <div id="addMemberForm" class="hidden mb-4 p-4 bg-[#fafbfc] rounded-xl">
                            <div class="flex gap-3">
                                <input 
                                    type="text" 
                                    id="memberName" 
                                    class="input-field flex-1 px-4 py-3 rounded-lg bg-white"
                                    placeholder="輸入姓名"
                                    maxlength="20"
                                    aria-label="參與者姓名"
                                >
                                <button 
                                    id="confirmAddMember"
                                    class="btn-primary px-6 py-3 bg-[#0a5c5c] text-white font-medium rounded-lg focus-ring"
                                >
                                    確認
                                </button>
                            </div>
                        </div>
                        
                        <!-- 成员列表 -->
                        <div id="memberList" class="space-y-2 max-h-[300px] overflow-y-auto">
                            <!-- 动态生成 -->
                        </div>
                        
                        <div id="emptyState" class="py-8 text-center text-[#5a6374]">
                            <svg class="mx-auto mb-3 opacity-40" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <line x1="19" y1="8" x2="19" y2="14"/>
                                <line x1="22" y1="11" x2="16" y2="11"/>
                            </svg>
                            <p class="text-sm">尚未新增參與者</p>
                            <p class="text-xs mt-1">點擊上方「新增」按鈕添加</p>
                        </div>
                    </div>
                </div>

                <!-- 右侧：结果区 -->
                <div class="lg:col-span-2">
                    <div class="card bg-white rounded-2xl p-6 sticky top-28 animate-fade-in-up animate-delay-2">
                        <h2 class="text-lg font-bold text-[#1a1f2e] mb-6 flex items-center gap-3">
                            <span class="w-10 h-10 bg-[#0a5c5c] rounded-xl flex items-center justify-center">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                    <polyline points="9 11 12 14 22 4"/>
                                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                </svg>
                            </span>
                            計算結果
                        </h2>
                        
                        <!-- 汇总信息 -->
                        <div class="space-y-4 mb-6">
                            <div class="flex justify-between items-center py-3 border-b border-[#e8eaed]">
                                <span class="text-[#5a6374]">帳單金額</span>
                                <span id="summarySubtotal" class="font-bold text-[#1a1f2e]">$0</span>
                            </div>
                            <div class="flex justify-between items-center py-3 border-b border-[#e8eaed]">
                                <span class="text-[#5a6374]">小費 (<span id="summaryTipPercent">15</span>%)</span>
                                <span id="summaryTip" class="font-bold text-[#1a1f2e]">$0</span>
                            </div>
                            <div class="flex justify-between items-center py-3 bg-[#0a5c5c]/5 rounded-xl px-4 -mx-2">
                                <span class="font-bold text-[#1a1f2e]">總計</span>
                                <span id="summaryTotal" class="font-bold text-xl text-[#0a5c5c]">$0</span>
                            </div>
                        </div>
                        
                        <!-- 分摊结果 -->
                        <div class="mb-6">
                            <h3 class="text-sm font-medium text-[#5a6374] mb-3">每人應付</h3>
                            <div id="resultList" class="space-y-2">
                                <div class="py-8 text-center text-[#5a6374] text-sm">
                                    請輸入金額並新增參與者
                                </div>
                            </div>
                        </div>
                        
                        <!-- 操作按钮 -->
                        <div class="space-y-3">
                            <button 
                                id="calculateBtn"
                                class="btn-primary w-full py-4 bg-[#0a5c5c] text-white font-medium rounded-xl focus-ring flex items-center justify-center gap-2"
                            >
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
                                    <line x1="4" y1="10" x2="20" y2="10"/>
                                </svg>
                                計算分攤
                            </button>
                            <button 
                                id="resetBtn"
                                class="btn-secondary w-full py-3 border border-[#e8eaed] text-[#5a6374] font-medium rounded-xl focus-ring"
                            >
                                重新設定
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 bg-[#1a1f2e] text-white">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div>
                    <p class="headline-font text-lg font-bold text-white">理財達人</p>
                    <p class="text-xs text-white/60 mt-1">幫世人解決一切金錢問題</p>
                </div>
                <div class="flex items-center gap-6 text-sm text-white/60">
                    <a href="index.html" class="hover:text-white transition-colors focus-ring rounded">返回首頁</a>
                    <a href="#" class="hover:text-white transition-colors focus-ring rounded">使用說明</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 初始化变量
        let members = [];
        let currentTipPercent = 15;
        
        // DOM 元素
        const totalAmountInput = document.getElementById('totalAmount');
        const customTipInput = document.getElementById('customTip');
        const memberList = document.getElementById('memberList');
        const memberCount = document.getElementById('memberCount');
        const emptyState = document.getElementById('emptyState');
        const addMemberForm = document.getElementById('addMemberForm');
        const memberNameInput = document.getElementById('memberName');
        const resultList = document.getElementById('resultList');
        
        // 汇总元素
        const summarySubtotal = document.getElementById('summarySubtotal');
        const summaryTipPercent = document.getElementById('summaryTipPercent');
        const summaryTip = document.getElementById('summaryTip');
        const summaryTotal = document.getElementById('summaryTotal');
        
        // 移动端菜单
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', function() {
                const isExpanded = menuBtn.getAttribute('aria-expanded') === 'true';
                menuBtn.setAttribute('aria-expanded', !isExpanded);
                mobileMenu.classList.toggle('hidden');
            });
        }
        
        // 小费按钮
        const tipButtons = document.querySelectorAll('.tip-btn');
        tipButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                tipButtons.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentTipPercent = parseFloat(btn.dataset.tip) || 0;
                customTipInput.value = '';
                updateSummary();
            });
        });
        
        // 自定义小费输入
        customTipInput.addEventListener('input', function() {
            const value = parseFloat(customTipInput.value);
            if (!isNaN(value) && value >= 0 && value <= 100) {
                currentTipPercent = value;
                tipButtons.forEach(function(b) { b.classList.remove('active'); });
                updateSummary();
            }
        });
        
        // 金额输入
        totalAmountInput.addEventListener('input', updateSummary);
        
        // 添加成员按钮
        const addMemberBtn = document.getElementById('addMemberBtn');
        addMemberBtn.addEventListener('click', function() {
            addMemberForm.classList.toggle('hidden');
            if (!addMemberForm.classList.contains('hidden')) {
                memberNameInput.focus();
            }
        });
        
        // 确认添加成员
        const confirmAddMember = document.getElementById('confirmAddMember');
        confirmAddMember.addEventListener('click', function() {
            addMember();
        });
        
        memberNameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addMember();
            }
        });
        
        function addMember() {
            const name = memberNameInput.value.trim();
            if (name) {
                members.push({
                    id: Date.now(),
                    name: name,
                    amount: 0
                });
                memberNameInput.value = '';
                renderMembers();
                addMemberForm.classList.add('hidden');
            }
        }
        
        // 渲染成员列表
        function renderMembers() {
            if (members.length === 0) {
                memberList.innerHTML = '';
                emptyState.classList.remove('hidden');
                memberCount.textContent = '(0人)';
                return;
            }
            
            emptyState.classList.add('hidden');
            memberCount.textContent = '(' + members.length + '人)';
            
            memberList.innerHTML = members.map(function(member, index) {
                return '<div class="member-item flex items-center justify-between p-3 rounded-xl border border-[#e8eaed]" data-id="' + member.id + '">' +
                    '<div class="flex items-center gap-3">' +
                        '<span class="w-8 h-8 bg-[#0a5c5c]/10 rounded-full flex items-center justify-center text-sm font-medium text-[#0a5c5c]">' + (index + 1) + '</span>' +
                        '<span class="font-medium text-[#1a1f2e]">' + escapeHtml(member.name) + '</span>' +
                    '</div>' +
                    '<button class="remove-member p-2 text-[#5a6374] hover:text-[#dc2626] transition-colors focus-ring rounded" aria-label="移除 ' + escapeHtml(member.name) + '">' +
                        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
                            '<line x1="18" y1="6" x2="6" y2="18"/>' +
                            '<line x1="6" y1="6" x2="18" y2="18"/>' +
                        '</svg>' +
                    '</button>' +
                '</div>';
            }).join('');
            
            // 绑定移除事件
            document.querySelectorAll('.remove-member').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const item = this.closest('.member-item');
                    const id = parseInt(item.dataset.id, 10);
                    item.classList.add('removing');
                    setTimeout(function() {
                        members = members.filter(function(m) { return m.id !== id; });
                        renderMembers();
                    }, 300);
                });
            });
        }
        
        // 更新汇总信息
        function updateSummary() {
            const subtotal = parseFloat(totalAmountInput.value) || 0;
            const tip = subtotal * currentTipPercent / 100;
            const total = subtotal + tip;
            
            summarySubtotal.textContent = '$' + subtotal.toLocaleString();
            summaryTipPercent.textContent = currentTipPercent;
            summaryTip.textContent = '$' + Math.round(tip).toLocaleString();
            summaryTotal.textContent = '$' + Math.round(total).toLocaleString();
        }
        
        // 计算分摊
        const calculateBtn = document.getElementById('calculateBtn');
        calculateBtn.addEventListener('click', calculate);
        
        function calculate() {
            const subtotal = parseFloat(totalAmountInput.value) || 0;
            
            if (subtotal <= 0) {
                showResultMessage('請輸入有效的帳單金額');
                return;
            }
            
            if (members.length === 0) {
                showResultMessage('請至少新增一位參與者');
                return;
            }
            
            const tip = subtotal * currentTipPercent / 100;
            const total = subtotal + tip;
            const perPerson = total / members.length;
            
            // 更新结果
            resultList.innerHTML = members.map(function(member, index) {
                return '<div class="result-item flex items-center justify-between p-4 bg-[#fafbfc] rounded-xl" style="animation-delay: ' + (index * 0.1) + 's">' +
                    '<div class="flex items-center gap-3">' +
                        '<span class="w-8 h-8 bg-[#0a5c5c] rounded-full flex items-center justify-center text-sm font-medium text-white">' + (index + 1) + '</span>' +
                        '<span class="font-medium text-[#1a1f2e]">' + escapeHtml(member.name) + '</span>' +
                    '</div>' +
                    '<span class="font-bold text-lg text-[#0a5c5c]">$' + Math.round(perPerson).toLocaleString() + '</span>' +
                '</div>';
            }).join('');
        }
        
        function showResultMessage(message) {
            resultList.innerHTML = '<div class="py-6 text-center text-[#dc2626] text-sm">' + escapeHtml(message) + '</div>';
        }
        
        // 重置
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.addEventListener('click', function() {
            totalAmountInput.value = '';
            customTipInput.value = '';
            currentTipPercent = 15;
            members = [];
            
            tipButtons.forEach(function(b) { b.classList.remove('active'); });
            document.querySelector('.tip-btn[data-tip="15"]').classList.add('active');
            
            renderMembers();
            updateSummary();
            
            resultList.innerHTML = '<div class="py-8 text-center text-[#5a6374] text-sm">請輸入金額並新增參與者</div>';
        });
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 初始化
        renderMembers();
        updateSummary();
    </script>
</body>
</html>
